<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon | Something Amazing is Coming</title>
    <meta name="description" content="We are building something amazing. Sign up to be notified when we launch.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <!-- Logo as the background image -->
        <div class="logo-bg"></div>
        <div class="gradient-overlay"></div>
    </div>

    <main class="content-wrapper">
        <div class="glass-card fade-in-up">
            <div class="brand-header">
                <img src="logo.png" alt="Company Logo" class="brand-logo pulse-anim" />
                <div class="brand-status">Coming Soon</div>
            </div>
            
            <h1 class="main-heading">We're getting ready to <span class="highlight">launch</span>.</h1>
            <p class="sub-text">Our team is working hard to bring you a revolutionary new experience. Be the first to know when we go live.</p>
            
            <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks for subscribing!');">
                <div class="input-group">
                    <input type="email" placeholder="Enter your email address" required aria-label="Email address for notifications">
                    <button type="submit" class="cta-button">
                        <span>Notify Me</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
            </form>

            <div class="social-links">
                <a href="#" aria-label="Twitter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg></a>
                <a href="#" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                <a href="#" aria-label="LinkedIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg></a>
            </div>
        </div>
    </main>
</body>
</html>
